name: Repo freshness

# Successor to the old repo's submodule-freshness workflow. That one worked by
# staging a submodule pointer bump and opening a PR — there is nothing
# equivalent to commit here: [bootstrap.repos] records a URL and an optional
# branch name, and `mise run update:repos` moves the clones on the machine, not
# in this repo. So this job is a NOTIFIER, not a PR bot.
#
# What it watches (scripts/check-repos.py):
#   - a URL that no longer resolves — renamed, deleted or made private. Per
#     §2.28 a failing clone aborts the ENTIRE bootstrap at step 2, so this
#     breaks every fresh install, silently, until someone tries one.
#   - a `ref` that is no longer a branch or tag on the remote — same blast
#     radius, and invisible on machines that already cloned it.

on:
  schedule:
    # 1st of every month, 06:00 UTC
    - cron: '0 6 1 * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check:
    name: declared repos still resolve
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check every [bootstrap.repos] url
        id: check
        run: |
          set -uo pipefail
          if python3 scripts/check-repos.py | tee /tmp/report.txt; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Open an issue when something no longer resolves
        if: steps.check.outputs.ok == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          title="A [bootstrap.repos] entry no longer resolves"
          # Update the existing issue rather than opening a second one every month.
          # Dedup on a LABEL, not a title search: GitHub's search tokenizer
          # does not reliably match a title containing [ ] and ., so the
          # "comment on the existing one" branch would silently miss and open a
          # fresh issue every month.
          gh label create freshness --description "Automated repo-freshness check" --color ededed 2>/dev/null || true
          existing="$(gh issue list --state open --label freshness --json number --jq '.[0].number // empty')"
          body="$(printf 'Monthly freshness check failed. A declared repo is unreachable or its ref is gone.\n\nThis aborts `mise bootstrap` at its repos step, so **every fresh install breaks** until it is fixed.\n\n```\n%s\n```\n\n(run: %s)\n' "$(cat /tmp/report.txt)" "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID")"
          if [[ -n "$existing" ]]; then
            gh issue comment "$existing" --body "$body"
          else
            gh issue create --title "$title" --body "$body" --label freshness
          fi

      - name: Fail the run so the schedule shows red
        if: steps.check.outputs.ok == 'false'
        run: exit 1
