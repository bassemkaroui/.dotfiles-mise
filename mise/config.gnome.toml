# Profile: gnome — GTK/shell themes and GNOME Shell extensions. Replaces the
# old repo's `.desktop-env` detection + the DE auto-exclude that dropped the
# gnome_themes stow package on a non-GNOME machine: a machine now opts in by
# listing `gnome` in ~/.config/mise/miserc.toml.
#
# `gnome` is documented as implying `graphical` (miserc.example.toml) — list
# both. Nothing here enforces it, because mise has no profile dependencies.

[bootstrap.packages]
# dconf: `install:gnome-extensions` restores the extensions' settings with
# `dconf load`, and `setup:fonts` sets the GNOME Terminal font with it.
# (jq, also needed by the extensions task, is a core [tools] entry.)
"apt:dconf-cli" = "latest"

[dotfiles]
# GTK/shell themes, vendored from the old repo's gnome_themes package. Whole-dir
# symlinks are fine here (unlike ~/.gnupg or ~/.claude — D8): these trees are
# third-party, read-only, and nothing writes into them at runtime.
#
# Dropping the profile leaves the links in place: mise has no removal semantics,
# and `mise run cleanup` only reaps links whose SOURCE is gone (verified), not
# links whose profile was deselected. Delete ~/.themes/<name> by hand if you
# switch desktops — cleanup covers the other case, a theme removed from the repo,
# which is why it now scans ~/.themes at all.
"~/.themes/WhiteSur-dark" = { mode = "symlink" }
"~/.themes/ChromeOS-dark-compact" = { mode = "symlink" }

# NOT declared here: the GNOME Shell extension manifest
# (~/.local/share/gnome-extensions/manifest.txt) and its dconf dump. Those are
# machine/user data, they live in the private custom repo, and
# `install:gnome-extensions` reads them from wherever that repo deploys them.
