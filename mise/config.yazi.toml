# Profile: yazi — file manager + rich preview stack (old conf.d/yazi.toml).
# fzf/zoxide/eza/fd/ripgrep/jq moved to core (shell integration needs them).
# ffmpeg/imagemagick live in the `media` profile (apt), same split as before.
# The ~/.config/yazi dotfiles entries land in Phase 2.
[tools]
yazi = "latest"
glow = "latest"
hexyl = "latest"
duckdb = "latest"

# The whole config dir is one symlink, matching the old stow package: `ya pkg`
# writes plugins/ and package.toml back through it into the repo, which is how
# the vendored plugins and flavors got here in the first place. Nothing in this
# tree is secret and yazi keeps its state in ~/.local/state.
[dotfiles]
"~/.config/yazi" = { mode = "symlink" }
