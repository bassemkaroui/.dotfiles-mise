# Profile: graphical — anything that needs a display. Replaces the old repo's
# `.graphical-env` detection (auto-detect via $DISPLAY/$WAYLAND_DISPLAY with a
# manual override file): a machine now opts in by listing `graphical` in
# ~/.config/mise/miserc.toml.
#
# The tasks this profile gates — setup:fonts, install:ghostty,
# install:obsidian — call `require_profile graphical` themselves, so they are
# listed unconditionally in config.toml's [tasks.bootstrap] chain.

[bootstrap.packages]
# fc-cache, so a freshly installed Nerd Font is actually visible to terminals
# (setup:fonts). Most desktops pull it in already; explicit because a minimal
# graphical install may not.
"apt:fontconfig" = "latest"
# add-apt-repository, for install:ghostty's `--method deb` path — mise's apt
# manager installs packages but cannot add a PPA. Not needed by the default
# AppImage method; the task also installs it on demand.
"apt:software-properties-common" = "latest"

[dotfiles]
# Ghostty 1.3.1 loads BOTH ~/.config/ghostty/config and ~/.config/ghostty/
# config.ghostty, the latter winning on conflicting keys (verified with
# `ghostty +show-config`). The settings live in config.ghostty because the
# extension gets it syntax highlighting; `config` is empty but canonical.
"~/.config/ghostty/config" = { mode = "symlink" }
"~/.config/ghostty/config.ghostty" = { mode = "symlink" }
