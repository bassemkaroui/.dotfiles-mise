name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── 1. Lint ─────────────────────────────────────────────────────────────────
  # Calls `mise run repo:lint` rather than re-deriving the file set. The old
  # repo kept the find(1) invocation in two places (task + workflow) and had to
  # keep them in sync by hand; here CI runs literally what a developer runs.
  lint:
    name: repo:lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install checkers
        # zsh is NOT guaranteed on the runner image, and repo:lint fails rather
        # than skipping when $CI is set — a silently-skipped `zsh -n` would mean
        # a syntax error in .zshrc reaching every machine.
        run: |
          set -euo pipefail
          sudo apt-get update && sudo apt-get install -y shellcheck zsh
          # ruff is optional in the task (it is not a [bootstrap.packages]
          # entry), so install it here to make sure CI never takes the
          # skip-with-a-notice path.
          pipx install ruff || pip install --user ruff || sudo apt-get install -y ruff
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Install mise
        run: |
          curl -fsSL https://mise.run | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Run the lint task
        env:
          DOTFILES_MISE_REPO: ${{ github.workspace }}
        run: |
          set -euo pipefail
          mise trust "$GITHUB_WORKSPACE/mise/config.toml"
          mise run repo:lint

  # ── 2. Config sandbox ───────────────────────────────────────────────────────
  # Every profile combination resolves, links what it should and nothing it
  # shouldn't — in a throwaway $HOME, without installing a single tool.
  sandbox:
    name: sandbox (${{ matrix.profiles || 'core' }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        profiles:
          - ""
          - "ai,dev,yazi,neovim,media"
          - "graphical,gnome,laptop"
          - "graphical,cosmic,desktop"
          - "veracrypt"
    steps:
      - uses: actions/checkout@v4
      - name: Install mise
        run: |
          curl -fsSL https://mise.run | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      # --two-pass on BOTH of these, not just the assertion step below.
      # MISE_GLOBAL_CONFIG_FILE suppresses config.<profile>.toml (§2.12), so a
      # single-pass run resolves CORE ONLY — which made four of the five matrix
      # arms byte-identical to the core arm: `dotfiles apply --dry-run` hashed
      # the same for "", "graphical,gnome,laptop" and "ai,dev,yazi,neovim,media".
      # Anything broken inside a profile file was invisible to this whole job.
      - name: bootstrap status
        run: sandbox/mkhome.sh --two-pass --profiles "${{ matrix.profiles }}" -- bootstrap status
      - name: dotfiles apply --dry-run
        run: sandbox/mkhome.sh --two-pass --profiles "${{ matrix.profiles }}" -- dotfiles apply --dry-run
      - name: Profile-specific entries appear only with their profile
        # --two-pass is REQUIRED here: MISE_GLOBAL_CONFIG_FILE suppresses
        # config.<profile>.toml (§2.12), so a single-pass sandbox shows core
        # entries only and this assertion would pass for the wrong reason.
        run: |
          set -euo pipefail
          # No `|| true` on the capture: if the harness itself fails, this job
          # must fail. An earlier draft swallowed it, and with want=0 for four
          # of the five arms that made them pass while asserting nothing.
          out="$(sandbox/mkhome.sh --two-pass --profiles "${{ matrix.profiles }}" -- dotfiles status)"
          [[ -n "$out" ]] || { echo "::error::dotfiles status produced no output"; exit 1; }
          fail=0
          # Every arm asserts in BOTH directions: the profile's own entries are
          # present, and another profile's are absent.
          assert_count() {  # <label> <regex> <expected>
            local have; have="$(grep -c "$2" <<<"$out" || true)"
            if [[ "$have" != "$3" ]]; then
              echo "::error::$1: $have entr(y|ies) matching /$2/, expected $3 for '${{ matrix.profiles }}'"
              fail=1
            fi
          }
          # NOT config.gnome.toml: mise's self-management glob (config*.toml)
          # links every profile file into ~/.config/mise regardless of which
          # profiles are active, so that entry is present on every arm. CI
          # caught this on its first real run. The gnome profile's only
          # remaining content is an apt package, which `dotfiles status` cannot
          # see — it is asserted from `bootstrap status` below.
          case "${{ matrix.profiles }}" in
            *graphical*) assert_count ghostty '~/\.config/ghostty/' 2 ;;
            *)           assert_count ghostty '~/\.config/ghostty/' 0 ;;
          esac
          case "${{ matrix.profiles }}" in
            *yazi*) assert_count yazi '~/\.config/yazi' 1 ;;
            *)      assert_count yazi '~/\.config/yazi' 0 ;;
          esac
          # Core entries must be present on every arm, including the empty one.
          assert_count core-zshrc '~/\.zshrc' 1
          # Package-only profiles (gnome → dconf-cli, cosmic → ddcutil) show up
          # in `bootstrap status`, not in `dotfiles status`.
          pkgs="$(sandbox/mkhome.sh --two-pass --profiles "${{ matrix.profiles }}" -- bootstrap status)"
          assert_pkg() {  # <name> <expected 0|1>
            local have=0
            grep -q "apt:$1" <<<"$pkgs" && have=1
            if [[ "$have" != "$2" ]]; then
              echo "::error::apt:$1 present=$have, expected=$2 for '${{ matrix.profiles }}'"
              fail=1
            fi
          }
          case "${{ matrix.profiles }}" in *gnome*)  assert_pkg dconf-cli 1 ;; *) assert_pkg dconf-cli 0 ;; esac
          case "${{ matrix.profiles }}" in *cosmic*) assert_pkg ddcutil 1 ;;   *) assert_pkg ddcutil 0 ;; esac
          assert_pkg zsh 1
          [[ "$fail" == 0 ]] || { echo "$out"; echo "$pkgs"; exit 1; }
      - name: The sandbox must not have written into the repo
        # sandbox/mkhome.sh symlinks the REAL repo into the fake $HOME, so
        # anything that writes "into ~/.dotfiles-mise" lands in the working
        # tree. §5 states the harness must never do that, but only the e2e job
        # checked it — and that job runs against a `cp -a` copy, so the property
        # was never actually tested where it can fail.
        run: |
          set -euo pipefail
          dirty="$(git status --porcelain)"
          [[ -z "$dirty" ]] || { echo "$dirty"; echo "::error::the sandbox run modified the repo working tree"; exit 1; }

  # ── 3. End-to-end ───────────────────────────────────────────────────────────
  # The container proof: a real ubuntu:24.04, a NON-ROOT user with passwordless
  # sudo (the production shape — root would hide every $USER/PAM/chsh edge
  # case), install.sh run for real, twice, with a fixture companion repo so the
  # cross-repo apply is exercised rather than skipped.
  #
  # CI cannot clone the author's private companion — GITHUB_TOKEN is scoped to
  # this repo — so the fixture is built in the job. It is also where the
  # §2.26 regression (template mode silently overwriting a real ~/.ssh/config)
  # is asserted.
  e2e:
    name: end-to-end (ubuntu:24.04, non-root)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        # Container jobs default to `sh`, where `set -o pipefail` is an illegal
        # option and every step here dies on line 1. The old repo's ci.yml set
        # this for the same reason.
        shell: bash
    container:
      image: ubuntu:24.04
      options: --user root
    env:
      DEBIAN_FRONTEND: noninteractive
      DOTFILES_NONINTERACTIVE: "1"
    steps:
      - name: Base prereqs
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            git sudo curl ca-certificates python3 locales tzdata
          locale-gen en_US.UTF-8

      - name: Create the tester user
        run: |
          useradd -m -s /bin/bash tester
          echo 'tester ALL=(ALL) NOPASSWD:ALL' > /etc/sudoers.d/tester
          chmod 0440 /etc/sudoers.d/tester

      - uses: actions/checkout@v4
        with:
          path: repo

      - name: Place the repo at ~tester/.dotfiles-mise
        run: |
          set -euo pipefail
          cp -a "$GITHUB_WORKSPACE/repo" /home/tester/.dotfiles-mise
          chown -R tester:tester /home/tester/.dotfiles-mise

      - name: Build the fixture companion repo
        # Mirrors the real companion's shape (CUSTOM.md): one config file with
        # explicit absolute sources, a home/ tree, and a template-mode entry.
        run: |
          set -euo pipefail
          C=/home/tester/.dotfiles-custom-mise
          mkdir -p "$C/mise" "$C/home" "$C/templates"
          cat > "$C/home/.gitconfig.identity" <<'EOF'
          [user]
          	name = CI Tester
          	email = tester@example.invalid
          EOF
          cat > "$C/templates/ssh_config.tmpl" <<'EOF'
          Host shared-host
            HostName shared.example.invalid
          {% if "laptop" in mise_env %}
          Host device-host
            HostName laptop.example.invalid
          {% else %}
          Host device-host
            HostName default.example.invalid
          {% endif %}
          EOF
          chmod 600 "$C/templates/ssh_config.tmpl"
          cat > "$C/mise/config.custom.toml" <<'EOF'
          [dotfiles]
          "~/.gitconfig.identity" = { source = "~/.dotfiles-custom-mise/home/.gitconfig.identity", mode = "symlink" }
          "~/.ssh/config" = { source = "~/.dotfiles-custom-mise/templates/ssh_config.tmpl", mode = "template" }
          EOF
          # A pre-existing REAL ~/.ssh/config: template mode overwrites one
          # silently (§2.26), so install.sh must back it up first.
          mkdir -p /home/tester/.ssh
          printf 'Host precious\n  HostName 203.0.113.9\n' > /home/tester/.ssh/config
          chmod 700 /home/tester/.ssh
          chmod 600 /home/tester/.ssh/config
          sha256sum /home/tester/.ssh/config | cut -d' ' -f1 > /tmp/precious.sha
          chown -R tester:tester "$C" /home/tester/.ssh

      - name: Install mise (as tester)
        run: sudo -u tester -H bash -lc 'curl -fsSL https://mise.run | sh'

      - name: install.sh — first run
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          sudo -u tester -H -E env DOTFILES_NONINTERACTIVE=1 DOTFILES_PROFILES=laptop \
            bash -lc 'export PATH="$HOME/.local/bin:$PATH"; ~/.dotfiles-mise/install.sh' </dev/null
          sudo -u tester -H bash -c '
            find "$HOME" -maxdepth 4 -type l -printf "%p -> %l\n" 2>/dev/null | sort > /tmp/run1.links
            find "$HOME" -maxdepth 6 -name "*.pre-mise.bak*" 2>/dev/null | sort > /tmp/run1.baks
          '

      - name: install.sh — second run (idempotency)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          sudo -u tester -H -E env DOTFILES_NONINTERACTIVE=1 \
            bash -lc 'export PATH="$HOME/.local/bin:$PATH"; ~/.dotfiles-mise/install.sh' </dev/null
          sudo -u tester -H bash -c '
            find "$HOME" -maxdepth 4 -type l -printf "%p -> %l\n" 2>/dev/null | sort > /tmp/run2.links
            find "$HOME" -maxdepth 6 -name "*.pre-mise.bak*" 2>/dev/null | sort > /tmp/run2.baks
          '
          fail=0
          diff -u /tmp/run1.links /tmp/run2.links || { echo "::error::symlink graph changed between runs"; fail=1; }
          diff -u /tmp/run1.baks  /tmp/run2.baks  || { echo "::error::second run created new .pre-mise.bak files"; fail=1; }
          exit $fail

      - name: Assert post-bootstrap state
        run: |
          set -euo pipefail
          sudo -u tester -H bash -lc '
            export PATH="$HOME/.local/bin:$PATH"
            fail=0
            err() { echo "::error::$1"; fail=1; }

            # --- core deployment ---
            for f in .zshrc .zshenv .bashrc .profile .p10k.zsh .config/mise/config.toml; do
              [[ -L "$HOME/$f" ]] || err "missing or not a symlink: ~/$f"
            done
            # ~/.gitconfig is mode = "copy" on purpose: `git config --global`
            # writes through a symlink and would edit the repo working tree.
            # So it must be a REAL file, and it must match the repo source.
            [[ -f "$HOME/.gitconfig" && ! -L "$HOME/.gitconfig" ]] \
              || err "~/.gitconfig must be a real file (mode = copy), not a symlink"
            cmp -s "$HOME/.gitconfig" "$HOME/.dotfiles-mise/home/.gitconfig" \
              || err "~/.gitconfig does not match the repo source"
            # And a --global write must NOT reach the repo.
            git config --global core.pager cat
            [[ -z "$(git -C "$HOME/.dotfiles-mise" status --porcelain home/.gitconfig)" ]] \
              || err "git config --global wrote into the repo working tree"
            # Restore deterministically: a later step asserts convergence, and
            # `--unset` can leave an empty [core] section behind.
            cp -f "$HOME/.dotfiles-mise/home/.gitconfig" "$HOME/.gitconfig"
            [[ -d "$HOME/.oh-my-zsh" ]]  || err "oh-my-zsh not cloned"
            [[ -L "$HOME/.config/tmux/tmux.conf" ]] || err "setup:repo-links did not link tmux.conf"
            command -v zsh >/dev/null || err "zsh (apt) not installed"
            command -v gpg >/dev/null || err "gnupg (apt) not installed"
            mise ls --installed | grep -qE "^(rust|go|node)\b" || err "expected mise runtimes missing"
            [[ $(find "$HOME" -maxdepth 5 -xtype l 2>/dev/null | wc -l) -eq 0 ]] || {
              find "$HOME" -maxdepth 5 -xtype l; err "broken symlinks under \$HOME"; }

            # --- companion repo (cross-repo apply) ---
            [[ -L "$HOME/.config/mise/conf.d/50-custom.toml" ]] || err "companion drop-in not linked"
            [[ -L "$HOME/.gitconfig.identity" ]] || err "companion .gitconfig.identity not deployed"
            [[ "$(git config --get user.email)" == "tester@example.invalid" ]] \
              || err "git identity not resolved through the [include] chain"

            # --- §2.26: the template-mode entry must not eat a real file ---
            [[ -f "$HOME/.ssh/config.pre-mise.bak" ]] || err "pre-existing ~/.ssh/config was NOT backed up"
            [[ "$(sha256sum "$HOME/.ssh/config.pre-mise.bak" | cut -d" " -f1)" == "$(cat /tmp/precious.sha)" ]] \
              || err "~/.ssh/config backup does not match the original"
            grep -q "laptop.example.invalid" "$HOME/.ssh/config" || err "ssh template did not render the laptop branch"
            [[ "$(stat -c %a "$HOME/.ssh/config")" == "600" ]] || err "rendered ~/.ssh/config is not mode 600"

            # --- login shell: the two defects CI exists to catch (session A, M5) ---
            out="$(bash --login -c "echo LOGIN_OK" </dev/null)"
            [[ "$out" == *LOGIN_OK* ]] || err "bash --login -c no longer runs its command (exec zsh regression)"

            # --- an interactive zsh must start clean on a fresh machine ---
            # Under a PTY, not `zsh -ic … </dev/null`: without a terminal zsh
            # cannot enable zle and exits non-zero with "can\x27t change option:
            # zle", which says nothing about the config. This is plan §2.22\x27s
            # lesson — measure interactivity from a real pty — and CI walked
            # straight into it on its first run.
            # The TRANSCRIPT goes to a real file, not /dev/null: everything zsh
            # writes goes to the pty, so sending the typescript to /dev/null
            # discards the very diagnostic this check exists to surface (the
            # first version of this step reported a failure with no output).
            script -qec "zsh -ic exit" /tmp/zsh-typescript.log >/dev/null 2>&1 \
              || { echo "--- zsh transcript ---"; cat /tmp/zsh-typescript.log; err "interactive zsh failed to start"; }
            # A clean start also means no error output from the rc files.
            if grep -qiE "command not found|parse error|no such file" /tmp/zsh-typescript.log; then
              echo "--- zsh transcript ---"; cat /tmp/zsh-typescript.log
              err "interactive zsh printed errors on startup"
            fi

            # --- M2: nothing may write into the repo working tree ---
            dirty="$(git -C "$HOME/.dotfiles-mise" status --porcelain)"
            [[ -z "$dirty" ]] || { echo "$dirty"; err "install.sh wrote into the repo working tree"; }

            exit $fail
          '

      - name: A fresh interactive bash must start clean (and at $? = 0)
        # The zsh smoke test above had no bash counterpart, and that gap shipped
        # a real regression: home/.bashrc ended with `[ -f ~/.bashrc.local ] && .
        # ~/.bashrc.local`, so on any machine without that file EVERY new
        # interactive shell started with $? = 1 — a prompt that renders exit
        # status shows a permanent phantom error. The identical bug was found
        # and fixed in .zshrc (8baf469) precisely because CI smoke-tested zsh.
        #
        # A pty is mandatory (§2.22) and the transcript goes to a real file, for
        # the same two reasons documented on the zsh check.
        run: |
          set -euo pipefail
          sudo -u tester -H env TERM=dumb \
            script -qec "bash -i -c 'echo BASHSTATUS=\$?'" /tmp/bash-typescript.log \
            >/dev/null 2>&1 || true
          fail=0
          if ! grep -q 'BASHSTATUS=0' /tmp/bash-typescript.log; then
            echo "--- bash transcript ---"; cat /tmp/bash-typescript.log
            echo "::error::a fresh interactive bash starts with a non-zero \$? (check ~/.bashrc's last line)"
            fail=1
          fi
          if grep -qiE 'command not found|syntax error|no such file' /tmp/bash-typescript.log; then
            echo "--- bash transcript ---"; cat /tmp/bash-typescript.log
            echo "::error::interactive bash printed errors on startup"
            fail=1
          fi
          exit $fail

      - name: Fresh-machine companion path (the one install.sh cannot cover)
        # install.sh links an ALREADY-CLONED companion at step 4b. On a genuinely
        # fresh machine the clone does not exist yet and setup:custom-hookup does
        # it at bootstrap step 12 — a different code path, with its own backup
        # and trust logic, which the steps above never reach. Two data-loss bugs
        # lived exactly here (no python3, and no TOML parser: both silently
        # skipped the backup and let template mode eat ~/.ssh/config).
        run: |
          set -euo pipefail
          # A local bare repo stands in for the private companion.
          sudo -u tester -H bash -c '
            set -e
            cd ~/.dotfiles-custom-mise
            git init -q -b main . 2>/dev/null || true
            git config user.email ci@example.invalid && git config user.name CI
            git add -A && git commit -qm fixture
            git clone -q --bare . /tmp/companion.git
          '
          # Tear the deployment down to the pre-companion state. The backups
          # from install.sh's own run MUST go too: leaving them made the
          # assertion below unconditionally true (it accepts .bak or .bak1, and
          # .bak was already there from the earlier run), so a setup:custom-hookup
          # that backed up nothing at all still passed. Verified by replaying the
          # sequence against a task with its backup pass removed: fail=0.
          sudo -u tester -H bash -c '
            rm -rf ~/.dotfiles-custom-mise ~/.config/mise/conf.d/50-custom.toml ~/.gitconfig.identity
            rm -f ~/.ssh/config.pre-mise.bak*
            printf "Host precious2\n  HostName 198.51.100.7\n" > ~/.ssh/config
            chmod 600 ~/.ssh/config
            sha256sum ~/.ssh/config | cut -d" " -f1 > /tmp/precious2.sha
          '
          sudo -u tester -H bash -lc '
            export PATH="$HOME/.local/bin:$PATH"
            DOTFILES_CUSTOM_MISE_URL=/tmp/companion.git mise run setup:custom-hookup
          '
          sudo -u tester -H bash -c '
            fail=0
            [[ -L ~/.config/mise/conf.d/50-custom.toml ]] || { echo "::error::task did not link the drop-in"; fail=1; }
            [[ -L ~/.gitconfig.identity ]] || { echo "::error::task did not apply the companion"; fail=1; }
            bak=""
            for c in ~/.ssh/config.pre-mise.bak ~/.ssh/config.pre-mise.bak1; do
              [[ -f "$c" ]] && bak="$c"
            done
            if [[ -z "$bak" ]]; then
              echo "::error::task did not back up the real ~/.ssh/config before template mode"; fail=1
            elif [[ "$(sha256sum "$bak" | cut -d" " -f1)" != "$(cat /tmp/precious2.sha)" ]]; then
              # /tmp/precious2.sha used to be computed and never compared, so a
              # backup of the WRONG content passed just as well as a right one.
              echo "::error::$bak does not match the ~/.ssh/config that existed before the task"; fail=1
            fi
            grep -q "shared.example.invalid" ~/.ssh/config \
              || { echo "::error::task did not render the companion ssh template"; fail=1; }
            exit $fail
          '

      - name: Login-shell fallback rung (forced)
        # The assertion in the previous step is vacuous by construction: tester
        # has passwordless sudo and is in /etc/passwd, so the task succeeds at
        # rung 1 (`sudo chsh`) and never writes ~/.bash_profile. Force the last
        # rung with a user that cannot use chsh, and assert the two defects the
        # guard exists for.
        run: |
          set -euo pipefail
          useradd -m -s /bin/bash norung
          cp -a /home/tester/.dotfiles-mise /home/norung/.dotfiles-mise
          chown -R norung:norung /home/norung/.dotfiles-mise
          printf 'export FROM_PROFILE=yes\n' > /home/norung/.profile
          chown norung:norung /home/norung/.profile
          # No sudo rights, and chsh made unreachable → the task must fall back.
          sudo -u norung -H env PATH=/usr/bin:/bin \
            bash /home/norung/.dotfiles-mise/mise/tasks/setup/login-shell-fallback </dev/null
          fail=0
          out="$(sudo -u norung -H bash --login -c 'echo LOGIN_OK; echo P=$FROM_PROFILE' </dev/null)"
          grep -q LOGIN_OK <<<"$out" || { echo "::error::bash --login -c stopped running its command"; fail=1; }
          grep -q 'P=yes'  <<<"$out" || { echo "::error::~/.profile no longer sourced for a login bash"; fail=1; }
          # Idempotent: a second run must not append a second block.
          sudo -u norung -H env PATH=/usr/bin:/bin \
            bash /home/norung/.dotfiles-mise/mise/tasks/setup/login-shell-fallback </dev/null
          n="$(grep -c 'exec zsh' /home/norung/.bash_profile)"
          [[ "$n" == 1 ]] || { echo "::error::$n exec-zsh lines in ~norung/.bash_profile, expected 1"; fail=1; }
          exit $fail

      - name: Live config lint catches what it exists for
        # `lint-config.py --live` guards the companion-repo contract, and it was
        # never exercised by CI at all (the only callers are install.sh and
        # setup:custom-hookup). Phase 5 specified the fixture as the place where
        # the string-shorthand and second-`dotfiles.root` regressions get
        # asserted; both checks worked but nothing ran them, so a regression in
        # either was invisible. Positive AND negative cases, on a real machine
        # with a real ~/.config/mise — which is the only place --live can run.
        run: |
          set -euo pipefail
          R=/home/tester/.dotfiles-mise
          D=/home/tester/.config/mise/conf.d/99-lint-probe.toml
          fail=0
          run_lint() { sudo -u tester -H bash -lc "cd /; python3 $R/scripts/lint-config.py --live"; }
          probe() {  # <label> <toml body>
            printf '%s\n' "$2" > "$D"; chown tester:tester "$D"
            if run_lint >/tmp/lint-probe.out 2>&1; then
              cat /tmp/lint-probe.out
              echo "::error::--live accepted a drop-in it must reject: $1"; fail=1
            fi
            rm -f "$D"
          }
          # Baseline: the real deployment plus the fixture companion must pass.
          run_lint || { echo "::error::--live rejects the known-good deployment"; fail=1; }
          probe "a second settings.dotfiles.root" \
            '[settings]
          dotfiles.root = "/tmp/elsewhere"'
          probe "the string-shorthand source form with a missing source" \
            '[dotfiles]
          "~/.foorc" = "/tmp/definitely-not-here/foorc"'
          probe "a [tools] key the core config already declares" \
            '[tools]
          ripgrep = "latest"'
          probe "a ~/.config/mise/** target outside config.toml (D9a)" \
            '[dotfiles]
          "~/.config/mise/conf.d/evil.toml" = { source = "/etc/hostname", mode = "symlink" }'
          # The drop-in must be gone whatever happened, or later steps inherit it.
          rm -f "$D"
          run_lint || { echo "::error::--live still failing after the probes were removed"; fail=1; }
          exit $fail

      - name: bootstrap status is converged
        # `mise bootstrap status` ALONE asserts nothing: without --missing it
        # exits 0 however much is missing, and it was not the last command in
        # the block either, so its rc was discarded twice over. Verified against
        # a sandbox with nothing installed: every line "missing", rc=0.
        # --missing is real (`mise bootstrap status --help`): "Exit with code 1
        # if any configured bootstrap state is not in its desired state".
        run: |
          set -euo pipefail
          sudo -u tester -H bash -lc '
            set -euo pipefail
            export PATH="$HOME/.local/bin:$PATH"
            mise bootstrap status            # human-readable, for the log
            mise bootstrap status --missing  # and this one actually fails
            mise dotfiles status --missing
          '
